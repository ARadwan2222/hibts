name: Android CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # This step recreates the google-services.json from a GitHub Secret
    # To use this, add your google-services.json content to a Secret named GOOGLE_SERVICES_JSON
    - name: Decode Google Services JSON
      if: "${{ secrets.GOOGLE_SERVICES_JSON != '' }}"
      run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > app/google-services.json

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: hibts-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
